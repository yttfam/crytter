<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>crytter — terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: system-ui, sans-serif;
    }
    header {
      background: #2d2d2d;
      color: #888;
      padding: 8px 16px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #3d3d3d;
      user-select: none;
    }
    header .title { color: #d4d4d4; font-weight: 600; }
    header .info { font-size: 12px; }
    #terminal-container {
      flex: 1;
      overflow: hidden;
      cursor: text;
    }
  </style>
</head>
<body>
  <header>
    <span class="title" id="tab-title">crytter</span>
    <span class="info" id="term-info">loading...</span>
  </header>
  <div id="terminal-container"></div>

  <script type="module">
    import init, { Terminal } from '/pkg/crytter_wasm.js';

    function copyText(text) {
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }
    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }

    async function main() {
      await init();

      const container = document.getElementById('terminal-container');
      const term = new Terminal();
      term.open(container);

      // rAF render loop
      function renderLoop() {
        term.render();
        requestAnimationFrame(renderLoop);
      }
      requestAnimationFrame(renderLoop);

      // Cursor blink timer
      setInterval(() => term.blinkCursor(), 530);

      document.getElementById('term-info').textContent =
        `${term.cols}×${term.rows}`;

      // Title change
      term.onTitleChange((title) => {
        document.getElementById('tab-title').textContent = title;
        document.title = title;
      });

      // Config from URL params
      const params = new URLSearchParams(location.search);
      const wsHost = params.get('host') || location.hostname;
      const wsPort = params.get('port') || '7777';
      const token = params.get('token') || 'hermytt-test-token';

      // Connect to existing session (recovered tab) or create a fresh one
      let sessionId = params.get('session') || null;
      if (!sessionId) {
        try {
          const resp = await fetch(`http://${wsHost}:${wsPort}/session`, {
            method: 'POST',
            headers: { 'X-Hermytt-Key': token },
          });
          if (resp.ok) {
            const data = await resp.json();
            sessionId = data.id;
          }
        } catch {}
      }

      const wsPath = sessionId ? `/ws/${sessionId}` : '/ws';
      const ws = new WebSocket(`ws://${wsHost}:${wsPort}${wsPath}`);
      let authenticated = false;

      ws.onopen = () => {
        // First-message auth
        ws.send(token);
      };

      ws.onmessage = (e) => {
        const data = e.data;
        if (!authenticated) {
          if (data === 'auth:ok') {
            authenticated = true;
            ws.send(JSON.stringify({ resize: [term.cols, term.rows] }));
            document.getElementById('term-info').textContent =
              `${term.cols}×${term.rows} · connected`;
            // Announce to registry
            const meta = { cols: term.cols, rows: term.rows };
            if (typeof highlight === 'function') {
              meta.prytty = true;
              meta.prytty_languages = ['rust','python','json','yaml','toml','diff','log','generic'];
            }
            fetch(`http://${wsHost}:${wsPort}/registry/announce`, {
              method: 'POST',
              headers: { 'X-Hermytt-Key': token, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: 'crytter-' + (sessionId || 'standalone'),
                role: 'renderer',
                endpoint: location.href,
                meta
              })
            }).catch(() => {});
            return;
          }
        }
        const response = term.write(data);
        if (response && ws.readyState === WebSocket.OPEN) {
          ws.send(response);
        }
      };

      ws.onclose = () => {
        document.getElementById('term-info').textContent =
          `${term.cols}×${term.rows} · disconnected`;
        term.write('\r\n\x1b[2m[session ended]\x1b[0m\r\n');
      };

      ws.onerror = () => {
        term.write('\x1b[31m[connection failed]\x1b[0m\r\n');
      };

      // Keyboard — skip during IME/dead key composition
      let composing = false;
      document.addEventListener('compositionstart', () => { composing = true; });
      document.addEventListener('compositionend', (e) => {
        composing = false;
        if (e.data && ws.readyState === WebSocket.OPEN) {
          ws.send(e.data);
        }
      });
      document.addEventListener('keydown', (e) => {
        if (composing) return;
        const data = term.handleKeyEvent(e);
        if (data != null) {
          e.preventDefault();
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(data);
          }
        }
      });

      // Paste — Cmd/Ctrl+V
      document.addEventListener('paste', (e) => {
        const text = e.clipboardData?.getData('text');
        if (text && ws.readyState === WebSocket.OPEN) {
          ws.send(text);
          e.preventDefault();
        }
      });

      // Selection — mouse events
      let mouseDown = false;
      let mouseDownPos = null;
      container.addEventListener('mousedown', (e) => {
        const rect = container.querySelector('canvas').getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        mouseDownPos = { x, y };
        term.mouseDown(x, y);
        mouseDown = true;
      });
      document.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        const rect = container.querySelector('canvas').getBoundingClientRect();
        term.mouseMove(e.clientX - rect.left, e.clientY - rect.top);
      });
      document.addEventListener('mouseup', (e) => {
        if (!mouseDown) return;
        mouseDown = false;
        term.mouseUp();
        // Auto-copy to clipboard
        const text = term.getSelection();
        if (text) {
          copyText(text);
        }
      });

      // Click on URL — Cmd/Ctrl+click opens link
      container.addEventListener('click', (e) => {
        if (e.metaKey || e.ctrlKey) {
          const rect = container.querySelector('canvas').getBoundingClientRect();
          const url = term.getUrlAt(e.clientX - rect.left, e.clientY - rect.top);
          if (url) {
            window.open(url, '_blank', 'noopener');
            e.preventDefault();
          }
        }
      });

      // Cmd+C / Ctrl+C with selection = copy, without = send Ctrl+C
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'c' && term.hasSelection) {
          e.preventDefault();
          const text = term.copySelection();
          if (text) copyText(text);
          term.clearSelection();
          return;
        }
        // Cmd+F / Ctrl+F — search in scrollback
        if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
          e.preventDefault();
          const needle = prompt('Search:');
          if (needle) {
            const results = JSON.parse(term.search(needle));
            if (results.length > 0) {
              // Scroll to first match
              const first = results[0];
              if (first.row < 0) {
                // In scrollback — scroll up to it
                const scrollbackOffset = -first.row;
                term.scrollUp(scrollbackOffset);
              }
            }
          }
          return;
        }
      }, true);

      // Scroll
      container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const lines = Math.max(1, Math.round(Math.abs(e.deltaY) / 20));
        if (e.deltaY < 0) {
          term.scrollUp(lines);
        } else {
          term.scrollDown(lines);
        }
      }, { passive: false });

      // Resize
      function sendResize() {
        term.fit();
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ resize: [term.cols, term.rows] }));
        }
        document.getElementById('term-info').textContent =
          `${term.cols}×${term.rows} · ${ws.readyState === WebSocket.OPEN ? 'connected' : 'disconnected'}`;
      }
      window.addEventListener('resize', sendResize);
    }

    main().catch(console.error);
  </script>
</body>
</html>
